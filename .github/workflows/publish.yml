name: Publish to NPM registry

on:
  workflow_run:
    workflows: ['Build']
    types:
      - completed
    branches: [master]

jobs:
  publish:
    # Only run if build succeeded and was triggered by push (not PR)
    if: ${{ github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'push' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24.x

      - name: Install latest npm
        run: npm install -g npm@latest

      - name: Verify npm version supports OIDC
        run: |
          NPM_VERSION=$(npm --version)
          echo "npm version: $NPM_VERSION"
          # Trusted publishing requires npm >= 11.5.1
          MAJOR=$(echo "$NPM_VERSION" | cut -d. -f1)
          if [ "$MAJOR" -lt 11 ]; then
            echo "ERROR: npm >= 11.5.1 required for OIDC trusted publishing"
            exit 1
          fi
          echo "✅ npm version OK"

      - name: Download build artifacts
        uses: actions/github-script@v7
        with:
          script: |
            let allArtifacts = await github.rest.actions.listWorkflowRunArtifacts({
               owner: context.repo.owner,
               repo: context.repo.repo,
               run_id: ${{ github.event.workflow_run.id }},
            });
            let matchArtifact = allArtifacts.data.artifacts.filter((artifact) => {
              return artifact.name == "dist"
            })[0];
            let download = await github.rest.actions.downloadArtifact({
               owner: context.repo.owner,
               repo: context.repo.repo,
               artifact_id: matchArtifact.id,
               archive_format: 'zip',
            });
            let fs = require('fs');
            fs.writeFileSync('${{github.workspace}}/dist.zip', Buffer.from(download.data));

      - name: Extract build artifacts
        run: |
          unzip -o dist.zip -d dist/
          rm dist.zip
          ls -la dist/

      - name: Verify build output
        run: |
          if [ ! -f "dist/index.js" ] || [ ! -f "dist/index.cjs" ] || [ ! -f "dist/index.d.ts" ] || \
             [ ! -f "dist/styles.css" ] || \
             [ ! -f "dist/tailwind.preset.js" ] || \
             [ ! -f "dist/themes/light.css" ] || [ ! -f "dist/themes/dark.css" ]; then
            echo "ERROR: dist directory is missing required files"
            ls -la dist/ 2>/dev/null || echo "dist/ directory not found"
            exit 1
          fi
          echo "✅ Build output verified"

      - name: Publish to NPM registry
        run: |
          # Disable prepare script (husky not installed in CI)
          npm pkg delete scripts.prepare
          npm publish --access public --provenance

      - name: Create Release Summary
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "### 📦 Published to npm" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**@shipshitdev/ui@${VERSION}**" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Install with:" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`bash" >> $GITHUB_STEP_SUMMARY
          echo "bun add @shipshitdev/ui" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
